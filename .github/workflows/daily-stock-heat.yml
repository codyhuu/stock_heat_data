name: Daily Stock Heat

on:
  schedule:
    # 09:17 Asia/Shanghai. GitHub schedules are evaluated in UTC.
    - cron: "17 1 * * *"
    # Backup runs in case GitHub delays or drops a scheduled run.
    - cron: "47 1 * * *"
    - cron: "17 2 * * *"
    - cron: "47 2 * * *"
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stock-heat
  cancel-in-progress: false

jobs:
  collect-report-notify:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect, report, and send Feishu message
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          report_file="reports/daily_heat_all-stocks_${report_date}.md"

          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "$report_file" ]; then
            echo "$report_file already exists. Skipping scheduled duplicate run."
            exit 0
          fi

          python -m app.cli collect --filter all-stocks --pages 1
          python -m app.cli report --filter all-stocks

      - name: Commit updated data and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/stocks_heat.db reports/*.md
          if git diff --cached --quiet; then
            echo "No data or report changes to commit."
          else
            git commit -m "Update stock heat data"
            git push
          fi
